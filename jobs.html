<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs - ChessVision AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            padding: 2rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2rem;
            color: #fff;
        }
        
        .back-link {
            color: #7ee8fa;
            text-decoration: none;
            margin-bottom: 1rem;
            display: inline-block;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .job-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .job-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .job-info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }
        
        .job-meta {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }
        
        .status {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status.pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .status.processing { background: rgba(126, 232, 250, 0.2); color: #7ee8fa; }
        .status.completed { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .status.failed { background: rgba(220, 53, 69, 0.2); color: #dc3545; }
        
        .progress-bar {
            width: 150px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        
        .progress-fill {
            height: 100%;
            background: #7ee8fa;
            transition: width 0.3s;
        }
        
        .view-btn {
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #7ee8fa 0%, #4d96ff 100%);
            border: none;
            border-radius: 6px;
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #7ee8fa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back-link">← Back to Home</a>
            <h1>Processing Jobs</h1>
        </header>
        
        <div id="jobList" class="job-list">
            <div class="empty-state">
                <div class="spinner"></div>
                <p>Loading jobs...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000/api' 
            : '/api';
        
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('job');
        
        async function loadJobs() {
            try {
                const response = await fetch(`${API_URL}/jobs/`);
                if (response.ok) {
                    const jobs = await response.json();
                    renderJobs(jobs);
                } else {
                    showEmpty('Failed to load jobs');
                }
            } catch (error) {
                console.error(error);
                showEmpty('Network error');
            }
        }
        
        function renderJobs(jobs) {
            const container = document.getElementById('jobList');
            
            if (jobs.length === 0) {
                showEmpty('No jobs yet. Upload a video to get started!');
                return;
            }
            
            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-info">
                        <h3>${job.title || 'Untitled Job'}</h3>
                        <div class="job-meta">
                            ${job.source || 'upload'} • ${new Date(job.created_at).toLocaleString()}
                        </div>
                        ${job.status === 'processing' ? `
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${job.progress || 0}%"></div>
                            </div>
                        ` : ''}
                    </div>
                    <div style="text-align: right;">
                        <span class="status ${job.status}">${job.status}</span>
                        ${job.status === 'completed' ? `
                            <br><br>
                            <a href="/game.html?id=${job.id}" class="view-btn">View Game</a>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function showEmpty(message) {
            document.getElementById('jobList').innerHTML = `
                <div class="empty-state">
                    <p>${message}</p>
                </div>
            `;
        }
        
        // Load jobs and refresh every 5 seconds
        loadJobs();
        setInterval(loadJobs, 5000);
        
        // If we have a job ID, poll that specific job
        if (jobId) {
            setInterval(async () => {
                try {
                    const response = await fetch(`${API_URL}/jobs/${jobId}`);
                    if (response.ok) {
                        const job = await response.json();
                        if (job.status === 'completed') {
                            window.location.href = `/game.html?id=${jobId}`;
                        }
                    }
                } catch (e) {}
            }, 3000);
        }
    </script>
</body>
</html>
